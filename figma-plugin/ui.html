<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f8;
        --panel: #ffffff;
        --text: #18191f;
        --muted: #666b76;
        --line: #d8dbe2;
        --accent: #f4b000;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
        font-family: Inter, "Microsoft YaHei", Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.25;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .card {
        display: grid;
        gap: 14px;
        padding: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      select,
      button {
        min-height: 40px;
        border-radius: 6px;
        font: inherit;
      }

      select {
        width: 100%;
        padding: 0 10px;
        color: var(--text);
        background: #fff;
        border: 1px solid var(--line);
      }

      button {
        border: 0;
        color: #16120a;
        font-weight: 800;
        background: linear-gradient(180deg, #ffd45a, var(--accent));
        cursor: pointer;
      }

      .secondary {
        color: var(--text);
        background: #edf0f5;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>房源视频 UI 组件库</h1>
    <p>生成两套风格的 Figma 组件：信息卡、空间标签、卖点大字、互动按钮、结尾总结卡。</p>

    <div class="card">
      <label>
        生成范围
        <select id="styleSelect">
          <option value="all">全部风格</option>
          <option value="estateBold">房源大字版</option>
          <option value="varietyVisit">探家综艺版</option>
        </select>
      </label>

      <button id="createBtn" type="button">生成组件库</button>
      <button id="closeBtn" class="secondary" type="button">关闭</button>
      <div id="status" class="status"></div>
    </div>

    <script>
      const status = document.getElementById("status");

      document.getElementById("createBtn").onclick = () => {
        status.textContent = "正在生成...";
        parent.postMessage(
          {
            pluginMessage: {
              type: "create-library",
              styleId: document.getElementById("styleSelect").value,
            },
          },
          "*"
        );
      };

      document.getElementById("closeBtn").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;
        status.textContent = message.text || "";
      };
    </script>
  </body>
</html>
