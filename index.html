<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>房源封面生成器</title>
    <link rel="stylesheet" href="styles.css?v=7" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="封面预览">
        <div class="canvas-wrap">
          <canvas id="coverCanvas" width="1080" height="1920"></canvas>
        </div>
      </section>

      <aside class="panel" aria-label="封面参数">
        <div class="panel-heading">
          <h1>封面生成</h1>
          <button id="downloadBtn" class="primary-btn" type="button">下载封面</button>
        </div>

        <label class="file-picker">
          <input id="imageInput" type="file" accept="image/*" />
          <span>上传图片</span>
        </label>

        <div class="field-grid">
          <label>
            <span>风格</span>
            <select id="templateSelect">
              <option value="estateBold">房源大字版</option>
              <option value="varietyVisit">探家综艺版</option>
            </select>
          </label>

          <label>
            <span>主标题</span>
            <input id="titleInput" type="text" value="北京国贸" />
          </label>

          <label>
            <span>大标题/面积</span>
            <input id="areaInput" type="text" value="78平" />
          </label>

          <label>
            <span>小标签/地段</span>
            <input id="locationInput" type="text" value="CBD核心区  东三环" />
          </label>

          <label>
            <span>副标题/户型</span>
            <input id="layoutInput" type="text" value="一室一厅一卫" />
          </label>

          <label>
            <span>卡片标题</span>
            <textarea id="captionInput" rows="3">国贸 CBD·78 m²一居｜一镜到底 Room Tour 国贸核心...</textarea>
          </label>

          <label>
            <span>账号</span>
            <input id="accountInput" type="text" value="安家在北京（瑞峰）" />
          </label>

          <label>
            <span>日期</span>
            <input id="dateInput" type="text" value="2025-09-05" />
          </label>

          <label>
            <span>点赞</span>
            <input id="likesInput" type="text" value="388" />
          </label>
        </div>

        <div class="toggle-row">
          <label>
            <input id="bottomCardToggle" type="checkbox" checked />
            <span>底部信息栏</span>
          </label>
        </div>
      </aside>
    </main>

    <script src="app.js?v=7"></script>
  </body>
</html>
